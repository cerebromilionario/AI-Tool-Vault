<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact AI Tools Hub</title>
    <meta name="description" content="Contact AI Tools Hub for submissions, partnerships, and feedback." />
    <link rel="canonical" href="https://aitoolshub.example/contact.html" />
    <script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={darkMode:'class'}</script>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <main class="container-main mx-auto px-4 py-12 max-w-2xl">
      <h1 class="text-3xl font-bold mb-3">Contact AI Tools Hub</h1>
      <p class="text-neutral-600 mb-8">Have a tool to submit or a partnership idea? Reach out below.</p>
      <form class="space-y-4">
        <input type="text" placeholder="Name" class="w-full rounded-xl border px-4 py-3" required />
        <input type="email" placeholder="Email" class="w-full rounded-xl border px-4 py-3" required />
        <textarea placeholder="Message" rows="5" class="w-full rounded-xl border px-4 py-3" required></textarea>
        <button class="rounded-xl bg-amber-400 text-neutral-900 font-semibold px-6 py-3">Send Message</button>
      </form>
      <p class="mt-8"><a class="text-amber-500" href="/">← Back to home</a></p>
    </main>
  </body>
</html>
