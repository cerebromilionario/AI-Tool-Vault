<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{metaDescription}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{metaDescription}}">
  <meta name="google-adsense-account" content="ca-pub-4613426749830025">
  <link rel="canonical" href="{{canonicalUrl}}">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4613426749830025" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/public/css/styles.css">
  <script type="application/ld+json">{{schema}}</script>
</head>
<body>
{{header}}
<main class="container">
<h1>{{heading}}</h1>
<p>{{description}}</p>
<div class="ad ad-placeholder">Google AdSense Placeholder (below hero)</div>
<div class="toolbar"><input id="search" type="search" placeholder="Search tools"><select id="categoryFilter"><option value="">All</option>{{filterOptions}}</select></div>
<p id="resultCount" class="result-count" aria-live="polite"></p>
<div class="grid" id="toolGrid">{{tools}}</div>
<div class="ad ad-placeholder">Google AdSense Placeholder (between cards)</div>
</main>
{{footer}}
<script src="/public/js/search.js" defer></script>
</body>
</html>
