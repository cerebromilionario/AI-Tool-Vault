<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{metaDescription}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{metaDescription}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{canonicalUrl}}">
  <link rel="canonical" href="{{canonicalUrl}}">
  <link rel="stylesheet" href="/public/css/styles.css">
  <script type="application/ld+json">{{schema}}</script>
</head>
<body>
  {{header}}
  <main class="container">
    <section class="hero">
      <div class="tool-hero-header">
        <img loading="lazy" src="{{logo}}" alt="{{toolName}} logo" width="96" height="96" class="tool-logo">
        <div>
          <p class="eyebrow">AI Tool Profile</p>
          <h1>{{toolName}}</h1>
          <p>{{description}}</p>
          <p class="tool-meta">Category: <a href="/categories/{{category}}">{{categoryLabel}}</a> · Pricing model: {{pricing}}</p>
        </div>
      </div>
      <div class="hero-search">
        <a class="btn" href="{{officialUrl}}" target="_blank" rel="noopener sponsored nofollow">Visit Official Website</a>
        <a class="btn btn-secondary" href="/alternatives/{{slug}}">View Alternatives</a>
      </div>
    </section>

    <section class="content-section">
      <h2>Features</h2>
      <ul>{{features}}</ul>
    </section>

    <section class="content-section">
      <div class="section-heading"><h2>Related Tools</h2></div>
      <div class="grid">{{relatedTools}}</div>
    </section>

    <section class="content-section">
      <div class="section-heading"><h2>Alternatives</h2></div>
      <div class="grid">{{alternatives}}</div>
    </section>
  </main>
  {{footer}}
</body>
</html>
