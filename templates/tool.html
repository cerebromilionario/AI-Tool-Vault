<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{metaDescription}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{metaDescription}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{canonicalUrl}}">
  <meta name="google-adsense-account" content="ca-pub-4613426749830025">
  <link rel="canonical" href="{{canonicalUrl}}">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4613426749830025" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/public/css/styles.css">
  <script type="application/ld+json">{{schema}}</script>
</head>
<body>
  {{header}}
  <main class="container">
    <section class="hero">
      <h1>{{toolName}}</h1>
      <p>{{description}}</p>
      <a class="btn" href="{{officialUrl}}" target="_blank" rel="noopener sponsored nofollow">Visit Official Website</a>
    </section>
    <div class="ad ad-hero">AdSense Slot (below hero)</div>
    <section>
      <h2>Key Features</h2>
      <ul>{{features}}</ul>
      <p><strong>Pricing:</strong> {{pricing}}</p>
      <p><a href="/alternatives/{{slug}}.html">Top alternatives to {{toolName}}</a></p>
      <p><a href="/categories/{{category}}.html">More {{categoryLabel}} tools</a></p>
    </section>
    <section>
      <h2>Related Tools</h2>
      <div class="grid">{{relatedTools}}</div>
    </section>
    <div class="ad ad-inline">AdSense Slot (inside article)</div>
  </main>
  {{footer}}
</body>
</html>
