<section class="content-section">
  <div class="section-heading"><h1>Top 10 {{tool_name}} Alternatives</h1></div>
  <p class="text-gray-700">Find similar tools and compare options before choosing your stack.</p>
  <p class="mt-3 mb-6"><a class="text-blue-600" href="/categories/{{category_slug}}.html">Explore more in {{category_name}}</a></p>
</section>

<section class="content-section">
  <div class="section-heading"><h2>Alternatives list</h2></div>
  <ol class="list-decimal pl-6 space-y-2 text-gray-700">
    {{alternatives_list}}
  </ol>
</section>

<section class="content-section">
  <div class="section-heading"><h2>Comparison table</h2></div>
  <div class="overflow-x-auto">
    <table class="min-w-full bg-white rounded-xl overflow-hidden">
      <thead class="bg-slate-100">
        <tr><th class="py-2 px-3 border text-left">#</th><th class="py-2 px-3 border text-left">Tool</th><th class="py-2 px-3 border text-left">Category</th></tr>
      </thead>
      <tbody>
        {{comparison_rows}}
      </tbody>
    </table>
  </div>
</section>
